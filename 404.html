<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>404 | Pipeline Broken 🛰️</title>
    <style>
        /* ================= 🌌 CYBERPUNK 404 CORE STYLES ================= */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Roboto, sans-serif; }
        body { background: #0a0f1d; color: #f1f5f9; min-height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; overflow: hidden; text-align: center; padding: 20px; }
        
        /* 🚨 GLOWING NEON ERRORS */
        .error-code { font-size: 8rem; font-weight: 900; line-height: 1; background: linear-gradient(135deg, #ff4a4a 0%, #ff7676 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; filter: drop-shadow(0 0 20px rgba(255, 74, 74, 0.3)); animation: glitchGlow 3s infinite ease-in-out; }
        
        @keyframes glitchGlow {
            0%, 100% { filter: drop-shadow(0 0 15px rgba(255, 74, 74, 0.3)); opacity: 1; }
            50% { filter: drop-shadow(0 0 30px rgba(255, 74, 74, 0.6)); opacity: 0.95; }
        }

        .error-title { font-size: 2rem; font-weight: 800; margin-top: 20px; color: #ffffff; letter-spacing: -0.5px; }
        .error-title span { color: #ff4a4a; }
        .error-subtitle { color: #94a3b8; font-size: 1rem; max-width: 450px; margin: 15px auto 35px auto; line-height: 1.6; font-weight: 500; }

        /* 📡 MATRIX RADAR ANIMATION CONTAINER */
        .radar-box { position: relative; width: 120px; height: 120px; margin-bottom: 25px; display: flex; justify-content: center; align-items: center; }
        .radar-circle { position: absolute; width: 100%; height: 100%; border: 2px dashed rgba(255, 74, 74, 0.2); border-radius: 50%; animation: radarSpin 10s linear infinite; }
        .radar-node { font-size: 2.5rem; animation: pulseNode 1.5s infinite alternate; }

        @keyframes radarSpin { 100% { transform: rotate(360deg); } }
        @keyframes pulseNode { 0% { transform: scale(0.9); opacity: 0.7; } 100% { transform: scale(1.1); opacity: 1; } }

        /* 🚀 RETURN CTA BUTTON */
        .btn-home { background: linear-gradient(135deg, #00ffcc 0%, #00bcff 100%); color: #0a0f1d; border: none; padding: 16px 35px; border-radius: 12px; font-size: 1.05rem; font-weight: 700; text-decoration: none; cursor: pointer; box-shadow: 0 8px 25px rgba(0, 255, 204, 0.2); transition: 0.3s ease; display: inline-flex; align-items: center; gap: 10px; }
        .btn-home:hover { transform: translateY(-3px); box-shadow: 0 12px 30px rgba(0, 255, 204, 0.4); }
        
        footer { position: absolute; bottom: 25px; color: #475569; font-size: 0.85rem; font-weight: 600; letter-spacing: 0.5px; }
    </style>
</head>
<body>

    <!-- 📡 RADAR DETECTOR -->
    <div class="radar-box">
        <div class="radar-circle"></div>
        <div class="radar-node">🛰️</div>
    </div>

    <!-- 🚨 CODE MATRICES -->
    <h1 class="error-code">404</h1>
    <h2 class="error-title">Web Pipeline <span>Broken</span></h2>
    <p class="error-subtitle">The coordinates you transmitted do not match any known server nodes on Aman's core matrix grid system.</p>

    <!-- 🚀 BACK TO ROOT PIPELINE -->
    <a href="index.html" class="btn-home">Reroute to Main Base 🚀</a>

    <footer>&copy; 2026 AmanDev Systems. Security Protocols Active.</footer>

</body>
</html>
