<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Aman Dev | Live Testimonials 💬</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Roboto, sans-serif; scroll-behavior: smooth; }
        body { background: #0a0f1d; color: #f1f5f9; min-height: 100vh; display: flex; flex-direction: column; overflow-x: hidden; position: relative; }
        
        /* 📡 GLOWING MODERN NAVBAR */
        .navbar { background: rgba(10, 15, 29, 0.85); backdrop-filter: blur(12px); width: 100%; padding: 20px 8%; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(255, 255, 255, 0.05); position: sticky; top: 0; z-index: 100; }
        
        .left-nav-meta { display: flex; align-items: center; gap: 16px; }
        
        /* 🔙 PREMIUM BACK ARROW BUTTON CSS */
        .btn-back-arrow { background: transparent; border: none; color: #94a3b8; font-size: 1.5rem; font-weight: 700; cursor: pointer; display: flex; align-items: center; justify-content: center; padding: 4px 8px; border-radius: 50%; transition: all 0.2s; text-decoration: none; user-select: none; }
        .btn-back-arrow:hover { color: #00ffcc; background: rgba(255, 255, 255, 0.05); transform: translateX(-3px); }

        .brand-name { font-size: 1.6rem; font-weight: 800; color: #ffffff; letter-spacing: -1px; cursor: pointer; text-decoration: none; }
        .brand-name span { color: #00ffcc; }
        
        /* 💻 LAPTOP NAVIGATION LINKS */
        .nav-links { display: flex; gap: 35px; list-style: none; align-items: center; }
        .nav-links a { text-decoration: none; color: #94a3b8; font-weight: 600; transition: 0.3s; }
        .nav-links a:hover, .nav-links a.active { color: #00ffcc; text-shadow: 0 0 10px rgba(0, 255, 204, 0.5); }

        /* 📱 NEW: PREMIUM MOBILE HAMBURGER BUTTON (THREE LINES) */
        .mobile-menu-trigger { display: none; flex-direction: column; gap: 6px; background: transparent; border: none; cursor: pointer; z-index: 1005; padding: 4px; }
        .mobile-menu-trigger span { width: 28px; height: 3px; background-color: #ffffff; border-radius: 2px; transition: all 0.3s ease-in-out; }
        
        /* थ्री-लाइंस एनिमेटेड एक्टिव स्टेट */
        .mobile-menu-trigger.active span:nth-child(1) { transform: translateY(9px) rotate(45deg); background-color: #00ffcc; }
        .mobile-menu-trigger.active span:nth-child(2) { opacity: 0; }
        .mobile-menu-trigger.active span:nth-child(3) { transform: translateY(-9px) rotate(-45deg); background-color: #00ffcc; }

        /* 📱 NEW: MOBILE SLIDE-IN DRAWER OVERLAY */
        .mobile-sidebar-drawer { position: fixed; top: 0; right: -100%; width: 280px; height: 100vh; background: rgba(7, 10, 20, 0.96); backdrop-filter: blur(20px); border-left: 1px solid rgba(0, 255, 204, 0.1); padding: 100px 30px; display: flex; flex-direction: column; gap: 24px; z-index: 1000; transition: right 0.4s cubic-bezier(0.16, 1, 0.3, 1); box-shadow: -10px 0 30px rgba(0,0,0,0.5); }
        .mobile-sidebar-drawer.open-drawer { right: 0; }
        .mobile-sidebar-drawer a { text-decoration: none; color: #94a3b8; font-size: 1.2rem; font-weight: 600; transition: 0.2s; padding: 8px 0; border-bottom: 1px solid rgba(255,255,255,0.02); }
        .mobile-sidebar-drawer a:hover { color: #00ffcc; padding-left: 6px; }

        .reviews-section { flex: 1; padding: 60px 8%; max-width: 1200px; margin: 0 auto; width: 100%; }
        .section-header { text-align: center; margin-bottom: 40px; }
        .section-title { font-size: 2.5rem; font-weight: 800; margin-bottom: 10px; }
        .section-title span { background: linear-gradient(135deg, #00ffcc 0%, #00bcff 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        /* ✍️ REVIEW SUBMIT FORM */
        .review-form-box { background: #070a14; border: 1px solid rgba(0, 255, 204, 0.1); padding: 30px; border-radius: 20px; max-width: 600px; margin: 0 auto 50px auto; box-shadow: 0 15px 35px rgba(0,0,0,0.3); }
        .form-toggle-btn { display: block; margin: 0 auto 20px auto; background: transparent; border: 1px solid #00ffcc; color: #00ffcc; padding: 10px 20px; border-radius: 10px; font-weight: 700; cursor: pointer; transition: 0.3s; }
        .form-toggle-btn:hover { background: #00ffcc; color: #0a0f1d; }
        #formContainer { display: none; margin-top: 20px; }
        
        .input-group { margin-bottom: 15px; }
        .input-group label { display: block; font-size: 0.85rem; font-weight: 700; color: #94a3b8; margin-bottom: 6px; }
        .input-group input, .input-group textarea, .input-group select { width: 100%; background: #0a0f1d; border: 1px solid rgba(255, 255, 255, 0.08); padding: 12px; border-radius: 10px; color: #ffffff; outline: none; }
        .input-group textarea { height: 80px; resize: none; }
        .btn-submit-review { width: 100%; background: linear-gradient(135deg, #00ffcc 0%, #00bcff 100%); color: #0a0f1d; border: none; padding: 12px; border-radius: 10px; font-weight: 700; cursor: pointer; }

        /* 📊 REVIEWS GRID */
        .reviews-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 30px; }
        .review-card { background: #070a14; border: 1px solid rgba(255,255,255,0.03); border-radius: 20px; padding: 30px; box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2); }
        
        .client-info { display: flex; align-items: center; gap: 15px; margin-bottom: 15px; }
        .client-avatar { width: 45px; height: 45px; background: #1e293b; border: 2px solid #00ffcc; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 1.3rem; }
        .client-name { font-size: 1.1rem; font-weight: 700; color: #ffffff; }
        .client-company { font-size: 0.8rem; color: #64748b; }
        
        .rating-stars { color: #ffd700; font-size: 0.9rem; margin-bottom: 12px; letter-spacing: 2px; }
        .review-text { color: #94a3b8; font-size: 0.95rem; line-height: 1.6; font-style: italic; }

        /* 🎉 PREMIUM SUCCESS TOAST */
        .toast-notification { position: fixed; bottom: -100px; right: 30px; background: #070a14; border: 1px solid #00ffcc; padding: 16px 25px; border-radius: 12px; display: flex; align-items: center; gap: 12px; box-shadow: 0 10px 30px rgba(0, 255, 204, 0.2); z-index: 2000; transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); opacity: 0; }
        .toast-notification.show { bottom: 30px; opacity: 1; }
        .toast-text { font-size: 0.95rem; font-weight: 600; color: #ffffff; }

        footer { width: 100%; text-align: center; padding: 25px; color: #475569; font-size: 0.95rem; border-top: 1px solid rgba(255,255,255,0.03); background: #070a14; margin-top: auto; }
        
        @media (max-width: 968px) { .navbar { padding: 15px 6%; } }
        @media (max-width: 768px) { 
            .nav-links { display: none; } 
            .mobile-menu-trigger { display: flex; } /* मोबाइल में हैमबर्गर एक्टिव */
        }
        @media (max-width: 480px) { .toast-notification { right: 5%; width: 90%; } }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="left-nav-meta">
            <!-- 🎯 बैक एरो बटन लिंक जोड़े गए हैं -->
            <a href="index.html" class="btn-back-arrow" title="Back to Home">←</a>
            <a href="index.html" class="brand-name">Aman<span>Dev</span></a>
        </div>
        
        <!-- 💻 LAPTOP NAVIGATION LINKS -->
        <ul class="nav-links">
            <li><a href="index.html#home">Home</a></li>
            <li><a href="index.html#about">About</a></li>
            <li><a href="index.html#services">Services</a></li>
            <li><a href="index.html#projects">Projects</a></li>
            <li><a href="reviews.html" class="active">Reviews</a></li>
            <li><a href="hire.html">Hire Me</a></li>
        </ul>

        <!-- 📱 THREE LINES MOBILE TRIGGER BUTTON -->
        <button class="mobile-menu-trigger" id="hamburgerBtn" onclick="toggleMobileSidebarMenu()" title="Open Menu">
            <span></span>
            <span></span>
            <span></span>
        </button>
    </nav>

    <!-- 📱 SLIDE-IN MOBILE SIDEBAR DRAWER -->
    <div class="mobile-sidebar-drawer" id="mobileSidebarDrawerShell">
        <a href="index.html#home" onclick="toggleMobileSidebarMenu()">Home</a>
        <a href="index.html#about" onclick="toggleMobileSidebarMenu()">About</a>
        <a href="index.html#services" onclick="toggleMobileSidebarMenu()">Services</a>
        <a href="index.html#projects" onclick="toggleMobileSidebarMenu()">Projects</a>
        <a href="reviews.html" onclick="toggleMobileSidebarMenu()">Reviews</a>
        <a href="hire.html" onclick="toggleMobileSidebarMenu()">Hire Me</a>
    </div>

    <section class="reviews-section">
        <div class="section-header">
            <h2 class="section-title">Client <span>Endorsements</span></h2>
        </div>

        <div class="review-form-box">
            <button class="form-toggle-btn" onclick="toggleReviewForm()">✍️ Leave a Feedback</button>
            <div id="formContainer">
                <form id="reviewForm">
                    <div class="input-group">
                        <label>YOUR NAME</label>
                        <input type="text" id="rName" placeholder="e.g., Rajesh Kumar" required>
                    </div>
                    <div class="input-group">
                        <label>DESIGNATION / COMPANY</label>
                        <input type="text" id="rCompany" placeholder="e.g., Startup Founder / Client" required>
                    </div>
                    <div class="input-group">
                        <label>SELECT RATING</label>
                        <select id="rRating">
                            <option value="⭐⭐⭐⭐⭐" selected>5 Stars ⭐⭐⭐⭐⭐</option>
                            <option value="⭐⭐⭐⭐">4 Stars ⭐⭐⭐⭐</option>
                            <option value="⭐⭐⭐">3 Stars ⭐⭐⭐</option>
                            <option value="⭐⭐">2 Stars ⭐⭐</option>
                            <option value="⭐">1 Star ⭐</option>
                        </select>
                    </div>
                    <div class="input-group">
                        <label>YOUR REVIEW</label>
                        <textarea id="rText" placeholder="How was your experience working with AmanDev?..." required></textarea>
                    </div>
                    <button type="submit" class="btn-submit-review">Transmit Review Node 🚀</button>
                </form>
            </div>
        </div>

        <div class="reviews-grid" id="reviewsGrid"></div>
    </section>

    <div class="toast-notification" id="reviewToast">
        <span style="font-size: 1.3rem;">🎉</span>
        <span class="toast-text" id="toastMessage">Review deployed successfully!</span>
    </div>

    <footer>&copy; 2026 AmanDev Systems.</footer>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBf9AlfMXqYzRZh3vnykAAoI8ICWnLEr5w",
            authDomain: "portfolio-ea55d.firebaseapp.com",
            projectId: "portfolio-ea55d",
            storageBucket: "portfolio-ea55d.firebasestorage.app",
            messagingSenderId: "764954959365",
            appId: "1:764954959365:web:c210d543eb899302b8866c"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        function toggleReviewForm() {
            const container = document.getElementById('formContainer');
            container.style.display = container.style.display === 'block' ? 'none' : 'block';
        }

        /* ================= 📱 MOBILE SIDEBAR TOGGLE LOGIC ================= */
        function toggleMobileSidebarMenu() {
            const btn = document.getElementById('hamburgerBtn');
            const drawer = document.getElementById('mobileSidebarDrawerShell');
            
            btn.classList.toggle('active');
            drawer.classList.toggle('open-drawer');
        }

        document.getElementById('reviewForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const name = document.getElementById('rName').value;
            const company = document.getElementById('rCompany').value;
            const rating = document.getElementById('rRating').value;
            const text = document.getElementById('rText').value;

            const toast = document.getElementById('reviewToast');
            const toastMsg = document.getElementById('toastMessage');

            try {
                await db.collection("reviews").add({
                    name: name,
                    company: company,
                    rating: rating,
                    text: text,
                    timestamp: firebase.firestore.FieldValue.serverTimestamp()
                });
                
                toastMsg.innerText = "Review Deployed Successfully!";
                toast.style.borderColor = "#00ffcc";
                toast.classList.add('show');
                
                document.getElementById('reviewForm').reset();
                toggleReviewForm();

                setTimeout(() => { toast.classList.remove('show'); }, 4000);

            } catch (error) {
                toastMsg.innerText = "Transmission Aborted: Upload Failure.";
                toast.style.borderColor = "#ff4a4a";
                toast.classList.add('show');
                setTimeout(() => { toast.classList.remove('show'); }, 4000);
            }
        });

        db.collection("reviews").orderBy("timestamp", "desc").onSnapshot((snapshot) => {
            const grid = document.getElementById('reviewsGrid');
            grid.innerHTML = "";
            snapshot.forEach((doc) => {
                const data = doc.data();
                grid.innerHTML += `
                    <div class="review-card">
                        <div class="client-info">
                            <div class="client-avatar">👨‍💻</div>
                            <div>
                                <div class="client-name">${data.name}</div>
                                <div class="client-company">${data.company}</div>
                            </div>
                        </div>
                        <div class="rating-stars">${data.rating}</div>
                        <p class="review-text">"${data.text}"</p>
                    </div>
                `;
            });
        });
    </script>
</body>
</html>
