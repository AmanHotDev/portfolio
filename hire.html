<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hire AmanHotDev | Start Your Project 🚀</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Roboto, sans-serif; }
        body { background: #0a0f1d; color: #f1f5f9; min-height: 100vh; display: flex; flex-direction: column; overflow-x: hidden; }
        
        .navbar { background: rgba(10, 15, 29, 0.85); backdrop-filter: blur(12px); width: 100%; padding: 20px 8%; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(255, 255, 255, 0.05); }
        .brand-name { font-size: 1.6rem; font-weight: 800; color: #ffffff; letter-spacing: -1px; cursor: pointer; }
        .brand-name span { color: #00ffcc; }
        .nav-links { display: flex; gap: 35px; list-style: none; }
        .nav-links a { text-decoration: none; color: #94a3b8; font-weight: 600; transition: 0.3s; }
        .nav-links a:hover { color: #00ffcc; text-shadow: 0 0 10px rgba(0, 255, 204, 0.5); }

        .hire-section { flex: 1; display: flex; justify-content: center; align-items: center; padding: 50px 6%; }
        .form-card { background: #070a14; border: 1px solid rgba(255,255,255,0.03); width: 100%; max-width: 600px; padding: 40px; border-radius: 24px; position: relative; box-shadow: 0 20px 50px rgba(0, 0, 0, 0.3); }
        .form-card::after { content: ''; position: absolute; inset: 0; border-radius: 24px; padding: 1px; background: linear-gradient(135deg, rgba(0,255,204,0.3), rgba(0,188,255,0.3)); -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0); -webkit-mask-composite: xor; mask-composite: exclude; pointer-events: none; }

        .form-title { font-size: 2.2rem; font-weight: 800; margin-bottom: 10px; text-align: center; }
        .form-title span { background: linear-gradient(135deg, #00ffcc 0%, #00bcff 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .form-subtitle { color: #94a3b8; font-size: 0.95rem; text-align: center; margin-bottom: 35px; }

        .input-group { margin-bottom: 25px; position: relative; }
        .input-group label { display: block; font-size: 0.9rem; font-weight: 600; color: #94a3b8; margin-bottom: 8px; letter-spacing: 0.5px; }
        .input-group input, .input-group textarea { width: 100%; background: #0a0f1d; border: 1px solid rgba(255, 255, 255, 0.08); padding: 14px 16px; border-radius: 12px; color: #ffffff; font-size: 1rem; transition: all 0.3s ease; outline: none; }
        .input-group input:focus, .input-group textarea:focus { border-color: #00ffcc; box-shadow: 0 0 12px rgba(0, 255, 204, 0.2); }
        .input-group textarea { resize: none; height: 120px; }

        /* 📊 CHARACTER COUNTER STYLE */
        .char-counter { font-size: 0.8rem; color: #64748b; text-align: right; margin-top: 5px; font-weight: 600; display: block; }

        .btn-submit { width: 100%; background: linear-gradient(135deg, #00ffcc 0%, #00bcff 100%); color: #0a0f1d; border: none; padding: 16px; border-radius: 12px; font-size: 1.1rem; font-weight: 700; cursor: pointer; box-shadow: 0 8px 25px rgba(0, 255, 204, 0.2); transition: 0.3s ease; margin-top: 10px; }
        .btn-submit:hover { transform: translateY(-2px); box-shadow: 0 12px 30px rgba(0, 255, 204, 0.4); }
        
        .social-dock { display: flex; justify-content: center; gap: 20px; margin-top: 30px; border-top: 1px solid rgba(255, 255, 255, 0.05); padding-top: 25px; }
        .social-icon { color: #94a3b8; text-decoration: none; font-size: 0.9rem; font-weight: 600; transition: 0.3s; }
        .social-icon:hover { color: #00ffcc; }
        footer { width: 100%; text-align: center; padding: 25px; color: #475569; font-size: 0.95rem; border-top: 1px solid rgba(255,255,255,0.03); background: #070a14; }

        /* 🎉 PREMIUM ANIMATED TOAST NOTIFICATION */
        .toast-notification { position: fixed; bottom: -100px; right: 30px; background: #070a14; border: 1px solid #00ffcc; padding: 16px 25px; border-radius: 12px; display: flex; align-items: center; gap: 12px; box-shadow: 0 10px 30px rgba(0, 255, 204, 0.2); z-index: 1000; transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); opacity: 0; }
        .toast-notification.show { bottom: 30px; opacity: 1; }
        .toast-icon { font-size: 1.3rem; }
        .toast-text { font-size: 0.95rem; font-weight: 600; color: #ffffff; }

        @media (max-width: 768px) { .navbar { padding: 15px 6%; } .form-card { padding: 30px 20px; } .form-title { font-size: 1.8rem; } }
        @media (max-width: 480px) { .nav-links { display: none; } .toast-notification { right: 5%; width: 90%; } }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="brand-name" onclick="window.location.href='index.html'">Aman<span>Hot<span>Dev</span></div>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="projects.html">Projects</a></li>
        </ul>
    </nav>

    <section class="hire-section">
        <div class="form-card">
            <h2 class="form-title">Let's Build Something <span>Epic</span></h2>
            <p class="form-subtitle">Drop your project requirements. I'll receive it instantly via secure web pipelines.</p>
            
            <form id="hireForm">
                <div class="input-group">
                    <label for="name">YOUR NAME</label>
                    <input type="text" id="name" placeholder="John Doe" required>
                </div>
                <div class="input-group">
                    <label for="email">YOUR EMAIL</label>
                    <input type="email" id="email" placeholder="john@example.com" required>
                </div>
                <div class="input-group">
                    <label for="budget">PROJECT BUDGET (ESTIMATED)</label>
                    <input type="text" id="budget" placeholder="e.g., $100 - $500">
                </div>
                <div class="input-group">
                    <label for="message">PROJECT DETAILS</label>
                    <textarea id="message" placeholder="Describe your website or web application idea..." maxlength="500" required></textarea>
                    <span class="char-counter" id="charCount">0 / 500</span>
                </div>
                <button type="submit" class="btn-submit">Send Message 🚀</button>
            </form>

            <div class="social-dock">
                <a href="https://github.com" target="_blank" class="social-icon">GitHub</a>
                <a href="https://fiverr.com/amanhotdev" target="_blank" class="social-icon">Fiverr</a>
            </div>
        </div>
    </section>

    <!-- 🌌 TOAST BOX STRUCTURE -->
    <div class="toast-notification" id="successToast">
        <span class="toast-icon">🚀</span>
        <span class="toast-text">Success! Security pipelines transmitted flawlessly.</span>
    </div>

    <footer>&copy; 2026 AmanHotDev Systems. Engineered for continuous excellence.</footer>

    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
    
    <script type="text/javascript">
        // 🔑 1. APKI EMAILJS PUBLIC KEY APPLIED SUCCESSFUL
        emailjs.init("7bQIhYvnCLwJExxeG");

        const form = document.getElementById('hireForm');
        const submitBtn = document.querySelector('.btn-submit');
        const messageInput = document.getElementById('message');
        const charCountDisplay = document.getElementById('charCount');

        // Live real-time character counter listener
        messageInput.addEventListener('input', (e) => {
            const currentLength = e.target.value.length;
            charCountDisplay.innerText = `${currentLength} / 500`;
            if(currentLength >= 450) { charCountDisplay.style.color = '#ff4a4a'; } 
            else { charCountDisplay.style.color = '#64748b'; }
        });

        form.addEventListener('submit', async function(event) {
            event.preventDefault();
            
            submitBtn.innerText = "Syncing Grid Pipelines...";
            submitBtn.disabled = true;

            const name = document.getElementById('name').value;
            const email = document.getElementById('email').value;
            const budget = document.getElementById('budget').value;
            const message = messageInput.value;

            const templateParams = {
                from_name: name,
                from_email: email,
                budget: budget,
                message: message
            };

            try {
                // 📡 AUTOMATED BACKEND TRANSMISSION WITH UPDATED SERVICE ID
                await emailjs.send('service_j11mnjl', 'template_8hakxid', templateParams);
                console.log("Gmail notification dispatched successfully.");

                // 🎉 Trigger Premium Toast Notification Instead of boring native alerts
                const toast = document.getElementById('successToast');
                toast.classList.add('show');
                form.reset();
                charCountDisplay.innerText = "0 / 500";

                setTimeout(() => {
                    toast.classList.remove('show');
                }, 4500);

            } catch (error) {
                console.error("Transmission Failure:", error);
                alert('Pipeline routing failed. Please try again.');
            } finally {
                submitBtn.innerText = "Send Message 🚀";
                submitBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
